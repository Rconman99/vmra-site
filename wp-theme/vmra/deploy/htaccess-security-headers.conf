# VMRA · Security + SEO headers for Big Mountain Mail shared hosting (Apache)
#
# Paste this ENTIRE block at the TOP of /public_html/.htaccess
# BEFORE the `# BEGIN WordPress` marker. WordPress's own block stays below.
#
# Deploy: DirectAdmin → File Manager → public_html → .htaccess → Edit → paste → Save
# (Or: download .htaccess, edit locally, upload back.)
#
# Verify after deploy (from any terminal):
#   curl -sI https://vmra.club/ | grep -iE "strict-transport|x-content|x-frame|referrer|permissions"
# Should show all five headers.
#
# Adds +2-4 Perfect Stack points (Layer 1 · Technical Trust).
# -----------------------------------------------------------------------------

<IfModule mod_headers.c>
	# HSTS — force HTTPS for 1 year. Flip to `max-age=63072000; includeSubDomains; preload`
	# once the production domain (vmra.club) is live and you've confirmed all subdomains
	# are HTTPS-ready. Keep max-age lower while testing so you can roll back fast.
	Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

	# Block MIME-type sniffing — stops browsers from guessing content types and
	# executing user-uploaded files as scripts.
	Header always set X-Content-Type-Options "nosniff"

	# Clickjacking protection — only allow this site to embed itself in iframes.
	Header always set X-Frame-Options "SAMEORIGIN"

	# Referrer policy — send the origin (vmra.club) but not the path when users
	# click outbound links. Protects driver emails / rule-page URLs from ref logs.
	Header always set Referrer-Policy "strict-origin-when-cross-origin"

	# Permissions policy — explicitly disable APIs this site doesn't use.
	# Racing schedule / standings don't need camera/mic/geolocation/payment.
	Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"

	# Unset Apache's default Server header so it doesn't advertise version.
	# (Some hosts block Header unset Server — safe to remove this line if you get a 500.)
	Header unset X-Powered-By
</IfModule>

# Force www or non-www (pick one once DNS cuts over — uncomment ONE block):
#
# <IfModule mod_rewrite.c>
#   RewriteEngine On
#   # Force non-www (vmra.club)
#   RewriteCond %{HTTP_HOST} ^www\.vmra\.club$ [NC]
#   RewriteRule ^(.*)$ https://vmra.club/$1 [R=301,L]
# </IfModule>

# Gzip compression for text assets — shaves 60-70% off HTML/CSS/JS payload.
<IfModule mod_deflate.c>
	AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript
	AddOutputFilterByType DEFLATE application/javascript application/json application/xml
	AddOutputFilterByType DEFLATE image/svg+xml application/rss+xml
</IfModule>

# Browser caching for static assets — cuts repeat-visit load time.
<IfModule mod_expires.c>
	ExpiresActive On
	ExpiresDefault "access plus 1 month"
	ExpiresByType text/html "access plus 0 seconds"
	ExpiresByType text/css "access plus 1 month"
	ExpiresByType application/javascript "access plus 1 month"
	ExpiresByType image/jpeg "access plus 1 year"
	ExpiresByType image/png "access plus 1 year"
	ExpiresByType image/webp "access plus 1 year"
	ExpiresByType image/svg+xml "access plus 1 year"
	ExpiresByType font/woff2 "access plus 1 year"
	ExpiresByType application/json "access plus 1 hour"
</IfModule>
